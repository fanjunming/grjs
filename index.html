  <!-- JavaScript 功能实现 -->
  <script>
    // 初始化配置填充
    function initConfig() {
      // 填充个人信息
      document.querySelectorAll('[data-config="name"]').forEach(el => {
        el.textContent = USER_CONFIG.name;
      });
      document.querySelectorAll('[data-config="city"]').forEach(el => {

      });
      
      // 设置QQ头像
      const avatarImg = document.getElementById('qq-avatar');
      avatarImg.src = `https://q1.qlogo.cn/g?b=qq&nk=${USER_CONFIG.qq}&s=240`;
      
      // 设置QQ聊天链接
      const qqChatLink = document.getElementById('qq-chat-link');
      qqChatLink.href = `https://wpa.qq.com/msgrd?v=3&uin=${USER_CONFIG.qq}&site=qq&menu=yes`;
    }
    
    // 主题切换
    function initTheme() {
      const themeToggle = document.getElementById('theme-toggle');
      const html = document.documentElement;
      
      // 检查保存的主题
      if (localStorage.getItem('theme') === 'dark' || 
          (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        html.classList.add('dark');
      }
      
      themeToggle.addEventListener('click', () => {
        html.classList.toggle('dark');
        localStorage.setItem('theme', html.classList.contains('dark') ? 'dark' : 'light');
      });
    }
    
    // 移动端菜单
    function initMobileMenu() {
      const menuButton = document.getElementById('mobile-menu-button');
      const mobileMenu = document.getElementById('mobile-menu');
      
      menuButton.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
      });
    }
    
    // 侧边导航高亮
    function initSidebar() {
      const sections = document.querySelectorAll('section[id]');
      const sidebarLinks = document.querySelectorAll('.sidebar-link');
      
      function highlightSidebar() {
        const scrollY = window.pageYOffset;
        
        sections.forEach(section => {
          const sectionHeight = section.offsetHeight;
          const sectionTop = section.offsetTop - 100;
          const sectionId = section.getAttribute('id');
          
          if(scrollY > sectionTop && scrollY <= sectionTop + sectionHeight) {
            sidebarLinks.forEach(link => {
              link.querySelector('span:last-child').classList.remove('bg-primary');
              link.querySelector('span:last-child').classList.add('bg-gray-300', 'dark:bg-gray-600');
              
              if(link.getAttribute('data-section') === sectionId) {
                link.querySelector('span:last-child').classList.remove('bg-gray-300', 'dark:bg-gray-600');
                link.querySelector('span:last-child').classList.add('bg-primary');
              }
            });
          }
        });
      }
      
      window.addEventListener('scroll', highlightSidebar);
      highlightSidebar(); // 初始化
    }
    
    // 滚动 Reveal 动画
    function initReveal() {
      const revealElements = document.querySelectorAll('.reveal');
      
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('reveal-active');
          }
        });
      }, {
        threshold: 0.1
      });
      
      revealElements.forEach(element => {
        observer.observe(element);
      });
    }
    
    // 自定义鼠标光标
    function initCursor() {
      const cursor = document.getElementById('cursor');
      
      document.addEventListener('mousemove', (e) => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
      });
    }
    
    // 点击粒子效果
    function initParticles() {
      document.addEventListener('click', (e) => {
        const colors = [USER_CONFIG.primaryColor, USER_CONFIG.accentColor, '#60a5fa', '#fb923c'];
        
        for (let i = 0; i < 6; i++) {
          const particle = document.createElement('div');
          particle.classList.add('particle');
          
          const size = Math.random() * 6 + 2;
          const color = colors[Math.floor(Math.random() * colors.length)];
          
          particle.style.width = size + 'px';
          particle.style.height = size + 'px';
          particle.style.backgroundColor = color;
          particle.style.left = e.clientX + 'px';
          particle.style.top = e.clientY + 'px';
          
          document.body.appendChild(particle);
          
          setTimeout(() => {
            particle.remove();
          }, 1000);
        }
      });
    }
    
    // 初始化所有功能
    document.addEventListener('DOMContentLoaded', () => {
      initConfig();
      initTheme();
      initMobileMenu();
      initSidebar();
      initReveal();
      initCursor();
      initParticles();
    });
  </script>
